<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Fieldnote</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<style>
@font-face {
  font-family: 'Switzer';
  src: url('https://cdn.fontshare.com/wf/ZALDQTVRB5QDLEJASCHWEYTBMRQWVDHF/HEPIOCUARKGQGJLB2LJ6LIHSXOBE3IRZ/AZPQJ7VJFXBLEYKNABUQVUDYTE7P3CGJ.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%; width: 100%;
  background: #000; color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  overflow: hidden;
  -webkit-user-select: none; user-select: none;
}

.nav-btn {
  position: fixed;
  top: max(12px, env(safe-area-inset-top, 12px));
  right: 12px;
  z-index: 100;
  padding: 6px 14px;
  border-radius: 12px;
  border: none;
  background: rgba(255, 192, 128, 0.85);
  color: #000;
  font: 600 13px/1 'Switzer', sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  text-decoration: none;
  box-shadow: 0 0 0 1px #000;
}

#report-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 200;
  background: rgb(252, 243, 234);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 60px 20px 40px;
  font: 15px/1.6 'Switzer', sans-serif;
  color: #222;
}
#report-overlay.active { display: block; }
#report-overlay .close-btn {
  position: fixed;
  top: max(12px, env(safe-area-inset-top, 12px));
  right: 12px;
  z-index: 201;
  padding: 6px 14px;
  border-radius: 12px;
  border: none;
  background: rgba(255, 192, 128, 0.85);
  color: #000;
  font: 600 13px/1 'Switzer', sans-serif;
  cursor: pointer;
  box-shadow: 0 0 0 1px #000;
}
#report-overlay h1 { font-size: 20px; margin-bottom: 16px; }
#report-overlay h2 { font-size: 17px; margin: 6px 0 4px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.12); }
#report-overlay h3 { font-size: 15px; margin: 10px 0 2px; }
#report-overlay p { margin: 0 0 4px; }
#report-overlay p:empty { display: none; }
#report-overlay ul { margin: 0 0 8px; padding-left: 20px; }
#report-overlay li { margin-bottom: 4px; }
#report-overlay hr { border: none; border-top: 1px solid rgba(0,0,0,.15); margin: 14px 0; }

#qr-overlay {
  display: none;
  position: fixed; inset: 0;
  z-index: 200;
  background: #fff;
  align-items: center;
  justify-content: center;
}
#qr-overlay.active { display: flex; }
#qr-overlay img { width: 70vw; max-width: 400px; image-rendering: pixelated; }

#preview {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1); /* mirror */
  display: none;
}
#preview.active { display: block; }

#ui {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
  z-index: 10;
}

#timer {
  font-size: 48px; font-weight: 700;
  font-variant-numeric: tabular-nums;
  text-shadow: 0 2px 8px rgba(0,0,0,.6);
  margin-bottom: 24px;
  opacity: 0;
  transition: opacity .2s;
}
#timer.visible { opacity: 1; }

#btn {
  position: relative;
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 4px solid #fff;
  background: #e33;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .2s;
  display: flex; align-items: center; justify-content: center;
}
#btn.recording { background: #fff; }
#btn.recording .stop-icon {
  display: block;
}
#btn .stop-icon {
  display: none;
  width: 28px; height: 28px;
  border-radius: 4px;
  background: #e33;
}

/* upload progress */
#upload-progress {
  display: none;
  position: fixed;
  bottom: max(60px, env(safe-area-inset-bottom, 60px));
  left: 24px;
  z-index: 10;
  width: 40px; height: 40px;
}
#upload-progress.visible { display: block; }
#upload-progress circle {
  fill: none;
  stroke-width: 3;
}
#upload-progress .bg { stroke: rgba(255,255,255,.2); }
#upload-progress .fg {
  stroke: #f80;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: center;
  transition: stroke-dashoffset .2s linear;
}
#upload-progress .pct {
  fill: #fff;
  font: 600 10px sans-serif;
  text-anchor: middle;
  dominant-baseline: central;
}

#status {
  margin-top: 16px;
  font-size: 14px;
  text-shadow: 0 1px 4px rgba(0,0,0,.6);
  min-height: 20px;
}
</style>
</head>
<body>

<a href="/map" class="nav-btn">map</a>
<link rel="prefetch" href="/map">
<link rel="prefetch" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
<link rel="prefetch" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<button class="nav-btn" style="top:calc(max(12px, env(safe-area-inset-top, 12px)) + 32px)" onclick="openReport()">report</button>
<div id="report-overlay">
  <button class="close-btn" onclick="document.getElementById('report-overlay').classList.remove('active')">close</button>
  <h1>Canvassing Report</h1>
  <div id="report-content" class="loading">Generating…</div>
</div>
<button class="nav-btn" style="top:auto;bottom:max(12px, env(safe-area-inset-bottom, 12px));width:36px;height:36px;padding:0;border-radius:50%;text-align:center;font-size:11px" onclick="document.getElementById('qr-overlay').classList.add('active')">QR</button>
<div id="qr-overlay" onclick="this.classList.remove('active')">
  <p style="font:15px/1.4 'Switzer',sans-serif;color:#333;margin-bottom:16px;text-align:center">Scan this QR code to install the app</p>
  <img src="/qr.png" alt="QR code">
</div>
<video id="preview" autoplay playsinline muted></video>
<svg id="upload-progress" viewBox="0 0 40 40">
  <circle class="bg" cx="20" cy="20" r="17"/>
  <circle class="fg" cx="20" cy="20" r="17" stroke-dasharray="106.8" stroke-dashoffset="106.8"/>
  <text class="pct" x="20" y="20">0%</text>
</svg>

<div id="ui">
  <div id="timer"></div>
  <div id="btn" role="button" tabindex="0">
    <div class="stop-icon"></div>
  </div>
  <div id="status">press the button to record a field note…</div>
</div>

<script>
const MAX_SECONDS = 60;

const preview = document.getElementById('preview');
const btn = document.getElementById('btn');
const timerEl = document.getElementById('timer');
const statusEl = document.getElementById('status');

let stream = null;
let recorder = null;
let chunks = [];
let timerInterval = null;
let secondsLeft = MAX_SECONDS;
let geoPos = null;
let recordOrientation = 'portrait';

// ---- Camera ----
async function initCamera() {
  if (!window.isSecureContext) {
    statusEl.textContent = 'HTTPS required for camera access';
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user' },
      audio: true
    });
    preview.srcObject = stream;
    preview.classList.add('active');
  } catch (e) {
    statusEl.textContent = `Camera error: ${e.name} — ${e.message}`;
    console.error('Camera error:', e);
  }
}

// ---- GPS (continuous tracking, always keep last known) ----
function initGeo() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    p => { geoPos = p.coords; },
    () => {},
    { enableHighAccuracy: true, maximumAge: 60000 }
  );
  // Also try to get a cached position immediately
  navigator.geolocation.getCurrentPosition(
    p => { if (!geoPos) geoPos = p.coords; },
    () => {},
    { enableHighAccuracy: false, maximumAge: Infinity, timeout: 0 }
  );
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    preview.srcObject = null;
    preview.classList.remove('active');
  }
}

// ---- Recording ----
async function startRecording() {
  if (!stream) await initCamera();
  if (!stream) return;
  chunks = [];

  // Capture orientation at record start
  recordOrientation = (window.innerHeight > window.innerWidth) ? 'portrait' : 'landscape';

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
    ? 'video/webm;codecs=vp9,opus'
    : 'video/webm';
  recorder = new MediaRecorder(stream, { mimeType });
  recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  recorder.onstop = () => upload();
  recorder.start(100);

  btn.classList.add('recording');
  secondsLeft = MAX_SECONDS;
  timerEl.textContent = secondsLeft;
  timerEl.classList.add('visible');
  statusEl.textContent = 'Recording…';

  timerInterval = setInterval(() => {
    secondsLeft--;
    timerEl.textContent = secondsLeft;
    if (secondsLeft <= 0) stopRecording();
  }, 1000);
}

function stopRecording() {
  if (!recorder || recorder.state !== 'recording') return;
  clearInterval(timerInterval);
  recorder.stop();
  btn.classList.remove('recording');
  timerEl.classList.remove('visible');
}

// ---- IndexedDB upload queue ----
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('fieldnote-queue', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('queue', { keyPath: 'id', autoIncrement: true });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function enqueue(blob, lat, lon, duration) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').add({
      blob, lat, lon, duration,
      timestamp: new Date().toISOString()
    });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function getQueue() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('queue', 'readonly');
    const req = tx.objectStore('queue').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dequeue(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

let uploading = false;
const CIRC = 2 * Math.PI * 17; // ~106.8

function setUploadProgress(pct) {
  const el = document.getElementById('upload-progress');
  el.querySelector('.fg').style.strokeDashoffset = CIRC * (1 - pct);
  el.querySelector('.pct').textContent = Math.round(pct * 100) + '%';
}

function xhrUpload(form) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => {
      if (e.lengthComputable) setUploadProgress(e.loaded / e.total);
    };
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) resolve();
      else reject(new Error('Upload failed'));
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.ontimeout = () => reject(new Error('Timeout'));
    xhr.timeout = 300000;
    xhr.open('POST', '/upload');
    xhr.send(form);
  });
}

async function processQueue() {
  if (uploading) return;
  const items = await getQueue();
  if (!items.length) return;

  uploading = true;
  for (const item of items) {
    try {
      setUploadProgress(0);

      // Pre-register
      await fetch('/api/pre-upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          lat: item.lat, lon: item.lon,
          duration: item.duration,
          size: item.blob.size,
          timestamp: item.timestamp
        })
      });

      const form = new FormData();
      form.append('video', item.blob, 'fieldnote.webm');
      form.append('lat', item.lat || '');
      form.append('lon', item.lon || '');

      await xhrUpload(form);
      setUploadProgress(1);

      await dequeue(item.id);
      statusEl.textContent = 'Sent!';
      playDing();
    } catch (e) {
      // Stop processing, will retry later
      statusEl.textContent = 'Upload queued — will retry…';
      break;
    }
  }
  uploading = false;

  // Check if queue is empty now
  const remaining = await getQueue();
  if (remaining.length === 0) {
    document.getElementById('upload-progress').classList.remove('visible');
    statusEl.textContent = 'press the button to record a field note…';
  }
}

// Retry queue every 30s
setInterval(processQueue, 30000);

// ---- Upload ----
async function upload() {
  const blob = new Blob(chunks, { type: 'video/webm' });
  const duration = MAX_SECONDS - secondsLeft;
  const lat = geoPos ? geoPos.latitude : null;
  const lon = geoPos ? geoPos.longitude : null;

  stopCamera();
  statusEl.textContent = 'Saving…';

  // Store in IndexedDB first
  await enqueue(blob, lat, lon, duration);
  statusEl.textContent = 'Saved — uploading…';
  const prog = document.getElementById('upload-progress');
  setUploadProgress(0);
  prog.classList.add('visible');

  // Try to upload immediately
  await processQueue();
}

// ---- Ding sound (synthesized) ----
function playDing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch (_) {}
}

// ---- Button handler ----
btn.addEventListener('click', () => {
  if (recorder && recorder.state === 'recording') {
    stopRecording();
  } else {
    startRecording();
  }
});

// ---- Service Worker ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

// ---- Report ----
function renderReport(md) {
  return md
    .replace(/^---$/gm, '<hr>')
    .replace(/^### (.*)/gm, '<h3>$1</h3>')
    .replace(/^## (.*)/gm, '<h2>$1</h2>')
    .replace(/^# (.*)/gm, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.*)/gm, '<li>$1</li>')
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    .replace(/\n+(<h[123])/g, '$1')
    .replace(/\n+(<hr)/g, '$1')
    .replace(/\n+(<ul)/g, '$1')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>')
    .replace(/<p>(<h[123]|<hr|<ul)/g, '$1')
    .replace(/(<\/h[123]>|<hr>|<\/ul>)<\/p>/g, '$1');
}

function openReport() {
  const overlay = document.getElementById('report-overlay');
  const content = document.getElementById('report-content');
  content.textContent = '';
  overlay.classList.add('active');
  fetch('/api/report')
    .then(r => { if (!r.ok) throw new Error('Server error'); return r.json(); })
    .then(data => {
      content.innerHTML = renderReport(data.report);
    })
    .catch(e => {
      content.textContent = 'Report unavailable — try again shortly.';
    });
}

// ---- Version polling (auto-refresh on server update) ----
let appVersion = null;

function checkVersion() {
  fetch('/api/version').then(r => r.json()).then(data => {
    if (appVersion === null) { appVersion = data.version; return; }
    if (data.version !== appVersion) {
      const isRecording = recorder && recorder.state === 'recording';
      if (isRecording || uploading) {
        const check = setInterval(() => {
          if (!(recorder && recorder.state === 'recording') && !uploading) {
            clearInterval(check); location.reload();
          }
        }, 2000);
      } else {
        location.reload();
      }
    }
  }).catch(() => {});
}

checkVersion();
setInterval(checkVersion, 5000);

// ---- Init ----
initGeo();
</script>
</body>
</html>
