<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Fieldnote</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
@font-face {
  font-family: 'Switzer';
  src: url('https://cdn.fontshare.com/wf/ZALDQTVRB5QDLEJASCHWEYTBMRQWVDHF/HEPIOCUARKGQGJLB2LJ6LIHSXOBE3IRZ/AZPQJ7VJFXBLEYKNABUQVUDYTE7P3CGJ.woff2') format('woff2');
  font-weight: 400; font-style: normal;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; background: #000; overflow: hidden; -webkit-user-select: none; user-select: none; }

#map { width: 100%; height: 100%; }

/* ---- Bottom bar ---- */
#bottom-bar {
  position: fixed;
  bottom: max(24px, calc(env(safe-area-inset-bottom, 8px) + 12px));
  left: 16px; right: 16px;
  height: 48px; z-index: 9500;
  background: rgba(255, 192, 128, 0.92);
  border-radius: 24px;
  display: flex; align-items: center;
  padding: 0 8px;
  box-shadow: 0 0 0 1px #000, 0 2px 8px rgba(0,0,0,.15);
}
#bottom-bar .bar-left,
#bottom-bar .bar-right {
  flex: 1; display: flex; align-items: center; gap: 4px;
}
#bottom-bar .bar-left { justify-content: space-evenly; padding-left: 8px; position: relative; }
#bottom-bar .bar-right { justify-content: space-evenly; padding-right: 8px; }
#bottom-bar .bar-center { width: 80px; flex-shrink: 0; }

.bar-btn {
  width: 38px; height: 38px; border: none; border-radius: 50%;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent; padding: 0;
}
.bar-btn svg { width: 20px; height: 20px; fill: none; stroke: #000; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.bar-btn.filled svg { fill: #000; stroke: none; }

/* ---- Rec button (overlaps bar) ---- */
#rec-area {
  position: fixed;
  bottom: max(16px, calc(env(safe-area-inset-bottom, 8px) + 4px));
  left: 0; right: 0;
  z-index: 9600;
  display: flex; justify-content: center; align-items: flex-end;
  pointer-events: none;
  height: 72px;
}
#btn {
  pointer-events: auto;
  width: 64px; height: 64px;
  border-radius: 50%; border: 3px solid #fff;
  background: #e33; cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .2s;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,.25);
}
#btn .rec-label {
  color: #fff; font: 700 13px/1 'Switzer', sans-serif; text-transform: uppercase; letter-spacing: 0.5px;
}
#btn.recording { background: #fff; }
#btn.recording .rec-label { display: none; }
#btn.recording .stop-icon { display: block; }
#btn .stop-icon {
  display: none; width: 20px; height: 20px; border-radius: 3px; background: #e33;
}

/* ---- Upload status (in bar) ---- */
#upload-status {
  width: 32px; height: 32px;
  display: none;
  position: absolute; left: 8px; top: 50%; transform: translateY(-50%);
}
#upload-status.active { display: block; }

/* ---- Report overlay ---- */
#report-overlay {
  display: none; position: fixed; inset: 0; z-index: 20000;
  background: rgb(252, 243, 234);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 60px 20px 40px; font: 15px/1.6 'Switzer', sans-serif; color: #222;
}
#report-overlay.active { display: block; }
#report-overlay .close-btn {
  position: fixed; top: max(12px, env(safe-area-inset-top, 12px)); right: 12px; z-index: 20001;
  padding: 6px 14px; border-radius: 12px; border: none;
  background: rgba(255, 192, 128, 0.85); color: #000;
  font: 600 13px/1 'Switzer', sans-serif; cursor: pointer; box-shadow: 0 0 0 1px #000;
}
#report-overlay h1 { font-size: 20px; margin-bottom: 16px; }
#report-overlay h2 { font-size: 17px; margin: 6px 0 4px; padding-top: 8px; border-top: 1px solid rgba(0,0,0,.12); }
#report-overlay h3 { font-size: 15px; margin: 10px 0 2px; }
#report-overlay p { margin: 0 0 4px; }
#report-overlay p:empty { display: none; }
#report-overlay ul { margin: 0 0 8px; padding-left: 20px; }
#report-overlay li { margin-bottom: 4px; }
#report-overlay hr { border: none; border-top: 1px solid rgba(0,0,0,.15); margin: 14px 0; }

/* ---- Invite overlay ---- */
#invite-overlay {
  display: none; position: fixed; inset: 0; z-index: 20000;
  background: rgb(252, 243, 234);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 60px 20px 40px; font: 15px/1.6 'Switzer', sans-serif; color: #222;
}
#invite-overlay.active { display: block; }
#invite-overlay .close-btn {
  position: fixed; top: max(12px, env(safe-area-inset-top, 12px)); right: 12px; z-index: 20001;
  padding: 6px 14px; border-radius: 12px; border: none;
  background: rgba(255, 192, 128, 0.85); color: #000;
  font: 600 13px/1 'Switzer', sans-serif; cursor: pointer; box-shadow: 0 0 0 1px #000;
}
#invite-overlay h1 { font-size: 20px; margin-bottom: 16px; }
#invite-overlay h2 { font-size: 17px; margin: 6px 0 4px; }
#invite-overlay input {
  display: block; width: 100%; padding: 12px 14px; border-radius: 10px; border: 2px solid #000;
  background: rgba(255,255,255,0.5); font: 400 16px 'Switzer', sans-serif;
  outline: none; margin-bottom: 10px;
}
#invite-overlay .invite-send {
  width: 100%; padding: 12px; border-radius: 12px; border: none;
  background: #000; color: rgb(255, 192, 128);
  font: 600 16px/1 'Switzer', sans-serif; cursor: pointer;
}
#invite-overlay ul { list-style: none; padding: 0; }
#invite-overlay li { padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.1); }

/* ---- Ward picker overlay ---- */
#ward-overlay {
  display: none; position: fixed; inset: 0; z-index: 20000;
  background: rgb(252, 243, 234);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 60px 20px 40px; font: 15px/1.6 'Switzer', sans-serif; color: #222;
}
#ward-overlay.active { display: block; }
#ward-overlay .close-btn {
  position: fixed; top: max(12px, env(safe-area-inset-top, 12px)); right: 12px; z-index: 20001;
  padding: 6px 14px; border-radius: 12px; border: none;
  background: rgba(255, 192, 128, 0.85); color: #000;
  font: 600 13px/1 'Switzer', sans-serif; cursor: pointer; box-shadow: 0 0 0 1px #000;
}
#ward-overlay h1 { font-size: 20px; margin-bottom: 16px; }
.ward-option {
  display: block; width: 100%; padding: 14px 16px; margin-bottom: 8px;
  border-radius: 12px; border: 2px solid #000;
  background: rgba(255,255,255,0.5); text-align: left;
  font: 400 16px/1.3 'Switzer', sans-serif; color: #222; cursor: pointer;
}
.ward-option.selected { background: #000; color: rgb(255, 192, 128); font-weight: 600; }
.ward-option .ward-district { display: block; font-size: 13px; opacity: 0.6; margin-top: 2px; }
.ward-option.selected .ward-district { opacity: 0.7; }

/* ---- Preview card (top of screen) ---- */
#preview-card {
  display: none; position: fixed;
  top: max(12px, env(safe-area-inset-top, 12px));
  left: 12px; right: 12px;
  z-index: 9000;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  border-radius: 16px; padding: 12px;
  align-items: center; gap: 12px;
}
#preview-card.active { display: flex; }
#preview-card .card-text {
  flex: 1; color: #fff; font: 14px/1.4 'Switzer', sans-serif; white-space: pre-line;
}
#preview-card .card-text .meta { font-size: 11px; opacity: 0.7; display: block; margin-bottom: 4px; }
#preview-card .card-thumb {
  width: 56px; height: 75px; border-radius: 8px;
  object-fit: cover; cursor: pointer; flex-shrink: 0; background: #333;
}
#preview-card .card-play {
  width: 44px; height: 44px; border-radius: 50%;
  background: rgba(255, 192, 128, 0.85); border: none;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
}
#preview-card .card-play svg { width: 20px; height: 20px; fill: #000; }
#preview-card .card-play.playing svg .play-icon { display: none; }
#preview-card .card-play:not(.playing) svg .stop-icon { display: none; }

/* ---- Video player (lozenge, same as camera inset) ---- */
#player {
  display: none; position: fixed;
  top: max(12px, env(safe-area-inset-top, 12px));
  left: 12px; right: 12px;
  bottom: max(100px, calc(env(safe-area-inset-bottom, 20px) + 80px));
  border-radius: 16px; overflow: hidden;
  z-index: 10000;
  box-shadow: 0 2px 12px rgba(0,0,0,.5);
  border: 2px solid #fff;
  background: #000;
}
#player.active { display: block; }
#player video {
  width: 100%; height: 100%;
  object-fit: cover;
}
#transcript {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 12px 16px max(12px, env(safe-area-inset-bottom, 12px));
  background: linear-gradient(transparent, rgba(0,0,0,.8));
  color: #fff; font: 14px/1.4 'Switzer', sans-serif; text-align: center;
}
#transcript:empty { display: none; }
#transcript .meta { font-size: 11px; opacity: 0.7; display: block; margin-bottom: 4px; }

/* ---- Camera inset ---- */
#camera-inset {
  display: none; position: fixed;
  top: max(12px, env(safe-area-inset-top, 12px));
  left: 12px; right: 12px;
  bottom: max(100px, calc(env(safe-area-inset-bottom, 20px) + 80px));
  border-radius: 16px; overflow: hidden;
  z-index: 9500;
  box-shadow: 0 2px 12px rgba(0,0,0,.5);
  border: 2px solid #fff;
}
#camera-inset.active { display: block; }
#camera-inset video {
  width: 100%; height: 100%;
  object-fit: cover; transform: scaleX(-1);
}
#camera-timer {
  position: absolute; bottom: 6px; left: 0; right: 0;
  text-align: center; color: #fff;
  font: 700 18px/1 sans-serif;
  text-shadow: 0 1px 4px rgba(0,0,0,.7);
}

/* ---- Upload status colors ---- */
#upload-status circle { fill: none; stroke-width: 3; }
#upload-status .bg { stroke: rgba(0,0,0,.15); }
#upload-status .fg {
  stroke: #000; stroke-linecap: round;
  transform: rotate(-90deg); transform-origin: center;
  transition: stroke-dashoffset .2s linear;
}
#upload-status .count {
  fill: #000; font: 600 10px sans-serif; text-anchor: middle; dominant-baseline: central;
}
#upload-status .tick {
  stroke: #060; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none;
  opacity: 0; transition: opacity .3s;
}
#upload-status.done .tick { opacity: 1; }
#upload-status.done .fg, #upload-status.done .count { opacity: 0; }
#upload-status.done .bg { stroke: rgba(0,0,0,.08); }

/* ---- Mode toggle ---- */
#mode-btn .mode-video { display: none; }
#mode-btn.video-mode .mode-video { display: block; }
#mode-btn.video-mode .mode-audio { display: none; }
#mode-btn svg { fill: #000; stroke: none; }
#mode-btn.bar-btn svg { width: 18px; height: 18px; }

/* ---- Map dots ---- */
.fn-dot {
  width: 24px; height: 24px; background: #f80;
  border: 3px solid #fff; border-radius: 50%;
  box-shadow: 0 1px 4px rgba(0,0,0,.4); cursor: pointer;
  transition: transform .2s, border-width .2s;
}
.fn-dot.selected {
  transform: scale(1.4); border-width: 4px;
  box-shadow: 0 0 0 4px rgba(255,136,0,.4), 0 1px 4px rgba(0,0,0,.4);
}
.user-dot {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font: 700 11px/1 sans-serif; color: #fff;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
  pointer-events: none;
}
.user-dot.me {
  background: #4285f4;
  box-shadow: 0 0 0 3px rgba(66,133,244,.3), 0 1px 4px rgba(0,0,0,.3);
}
.user-dot.peer {
  background: #1a5ab8;
}

/* ---- Ward lozenge (top left) ---- */
#ward-lozenge {
  display: none; position: fixed;
  top: max(12px, env(safe-area-inset-top, 12px));
  left: 50%; transform: translateX(-50%);
  z-index: 9999;
  height: 28px;
  align-items: center;
  border-radius: 14px;
  background: rgba(0,0,0,0.6);
  font: 600 12px/1 'Switzer', sans-serif;
  color: #fff;
  -webkit-tap-highlight-color: transparent;
}
#ward-lozenge.show { display: flex; }
#ward-lozenge.tappable { cursor: pointer; }
#ward-name {
  padding: 0 12px;
  white-space: nowrap;
}

/* ---- Version badge ---- */
#version-badge {
  display: none; position: fixed;
  top: max(12px, env(safe-area-inset-top, 12px));
  right: 12px; z-index: 9999;
  padding: 4px 10px; border-radius: 8px;
  background: rgba(0,0,0,0.6); color: #fff;
  font: 600 11px/1 'Switzer', sans-serif;
}
#version-badge.show { display: block; }

/* ---- Audio recording indicator ---- */
#audio-recording {
  display: none; position: fixed;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 9500;
  color: #fff; font: 600 18px/1 'Switzer', sans-serif;
  text-shadow: 0 1px 6px rgba(0,0,0,.6);
  pointer-events: none;
}
#audio-recording.active { display: block; }
#audio-recording .rec-dot {
  display: inline-block; width: 10px; height: 10px;
  background: #e33; border-radius: 50%; margin-right: 8px;
  vertical-align: middle;
  animation: pulse-dot 1.5s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* ---- Filter toggle ---- */
#filter-btn.bar-btn svg.filter-all { display: none; }
#filter-btn.show-all svg.filter-today { display: none; }
#filter-btn.show-all svg.filter-all { display: block; }
</style>
</head>
<body>

<!-- Overlays -->
<div id="report-overlay">
  <button class="close-btn" onclick="document.getElementById('report-overlay').classList.remove('active')">close</button>
  <h1 id="report-title">Canvassing Report</h1>
  <div id="report-content"></div>
</div>
<div id="invite-overlay">
  <button class="close-btn" onclick="closeInvite()">close</button>
  <h1>Invite</h1>
  <div id="invite-form">
    <input id="invite-name" type="text" placeholder="Name">
    <input id="invite-phone" type="tel" placeholder="Phone number">
    <button class="invite-send" onclick="sendInvite()">add &amp; show QR</button>
    <div id="invite-error" style="color:#c00;font-size:14px;margin-top:8px;display:none"></div>
  </div>
  <div id="invite-qr" style="display:none;text-align:center;margin-top:24px">
    <p id="invite-qr-name" style="font-size:18px;margin-bottom:16px"></p>
    <p id="invite-sms-status" style="font-size:14px;margin-bottom:12px"></p>
    <canvas id="invite-qr-canvas" style="width:70vw;max-width:300px;image-rendering:pixelated"></canvas>
    <p style="font-size:13px;margin-top:12px;opacity:0.6">or scan to join</p>
  </div>
  <div id="invite-list" style="margin-top:32px">
    <h2 style="font-size:16px;margin-bottom:8px">Team</h2>
    <ul id="invite-members"></ul>
  </div>
</div>

<!-- Ward picker overlay -->
<div id="ward-overlay">
  <button class="close-btn" onclick="closeWardPicker()">close</button>
  <h1>Select Ward</h1>
  <div id="ward-list"></div>
</div>

<!-- Ward lozenge -->
<div id="ward-lozenge">
  <span id="ward-name"></span>
</div>

<!-- Version badge -->
<div id="version-badge"></div>

<!-- Map -->
<div id="map"></div>

<!-- Preview card (top) -->
<div id="preview-card">
  <div class="card-text"></div>
  <img class="card-thumb">
  <button class="card-play" style="display:none">
    <svg viewBox="0 0 24 24"><polygon class="play-icon" points="6,3 20,12 6,21"/><rect class="stop-icon" x="5" y="5" width="14" height="14" rx="2"/></svg>
  </button>
  <audio id="card-audio" preload="none"></audio>
</div>

<!-- Video player -->
<div id="player">
  <video id="vid" playsinline></video>
  <div id="transcript"></div>
</div>

<!-- Camera inset -->
<div id="camera-inset">
  <video id="camera-preview" autoplay playsinline muted></video>
  <div id="camera-timer"></div>
</div>

<!-- Audio recording indicator -->
<div id="audio-recording"><span class="rec-dot"></span>recording</div>

<!-- Record button (floats above bar) -->
<div id="rec-area">
  <div id="btn" role="button" tabindex="0">
    <span class="rec-label">rec</span>
    <div class="stop-icon"></div>
  </div>
</div>

<!-- Bottom bar -->
<div id="bottom-bar">
  <div class="bar-left">
    <!-- Upload indicator -->
    <svg id="upload-status" viewBox="0 0 40 40">
      <circle class="bg" cx="20" cy="20" r="17"/>
      <circle class="fg" cx="20" cy="20" r="17" stroke-dasharray="106.8" stroke-dashoffset="106.8"/>
      <text class="count" x="20" y="20"></text>
      <polyline class="tick" points="13,20 18,25 27,15"/>
    </svg>
    <!-- Mode toggle -->
    <button id="mode-btn" class="bar-btn" onclick="toggleMode()">
      <svg viewBox="0 0 24 24">
        <g class="mode-audio"><path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/><path d="M17 11a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.93V21h2v-3.07A7 7 0 0 0 19 11h-2z"/></g>
        <g class="mode-video"><path d="M17 10.5V7a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-3.5l4 4V6.5l-4 4z"/></g>
      </svg>
    </button>
    <!-- Filter: clock icon -->
    <button id="filter-btn" class="bar-btn" onclick="toggleFilter()">
      <svg class="filter-today" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
      <svg class="filter-all" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    </button>
  </div>
  <div class="bar-center"></div>
  <div class="bar-right">
    <!-- Report: doc icon -->
    <button class="bar-btn" onclick="openReport()">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>
    </button>
    <!-- Invite: person+ icon -->
    <button class="bar-btn" onclick="openInvite()">
      <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
    </button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ==================== CLIENT LOGGING ====================
const _origLog = console.log.bind(console);
const _origError = console.error.bind(console);
const _origWarn = console.warn.bind(console);
const _logBuffer = [];

function _bufferLog(level, args) {
  const msg = Array.from(args).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
  _logBuffer.push({ level, msg, t: Date.now() });
}

console.log = function() { _origLog.apply(null, arguments); _bufferLog('log', arguments); };
console.error = function() { _origError.apply(null, arguments); _bufferLog('error', arguments); };
console.warn = function() { _origWarn.apply(null, arguments); _bufferLog('warn', arguments); };

window.addEventListener('error', e => _bufferLog('error', [`Uncaught: ${e.message} at ${e.filename}:${e.lineno}`]));
window.addEventListener('unhandledrejection', e => _bufferLog('error', [`Unhandled rejection: ${e.reason}`]));

function _flushLogs() {
  if (!_logBuffer.length) return;
  const batch = _logBuffer.splice(0);
  const token = localStorage.getItem('authToken');
  if (!token) return;
  fetch('/api/log', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
    body: JSON.stringify(batch)
  }).catch(() => {});
}

setInterval(_flushLogs, 5000);
document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') _flushLogs(); });

// ==================== AUTH ====================
const authToken = localStorage.getItem('authToken');
if (!authToken) location.href = '/@login';

const authHeaders = { 'x-auth-token': authToken };

function authFetch(url, opts = {}) {
  opts.headers = { ...authHeaders, ...(opts.headers || {}) };
  return fetch(url, opts);
}

// ==================== WARD SELECTION ====================
let selectedWard = localStorage.getItem('selectedWard') || null;
let userWards = [];

function initWardSelection() {
  authFetch('/api/auth/check').then(r => r.json()).then(data => {
    if (!data.ok) return;
    userWards = data.wards || [];
    Object.assign(wardCodeMap, data.wardCodes || {});
    if (userWards.length > 0) {
      if (!selectedWard || !userWards.some(w => slugify(w) === selectedWard)) {
        selectedWard = slugify(userWards[0]);
      }
      setSelectedWard(selectedWard);
    } else {
      resolveWardFromGPS();
    }
    // Lozenge is always tappable
    const lozenge = document.getElementById('ward-lozenge');
    lozenge.classList.add('tappable');
    lozenge.onclick = onWardTap;
  }).catch(() => {});
}

let currentGPSWard = null; // { ward, slug, wardCode } from latest GPS position
let wardBoundaryLayer = null;
let wardCodeMap = {}; // slug -> wardCode

function resolveWardFromGPS() {
  if (!geoPos) return;
  authFetch(`/api/ward-lookup?lat=${geoPos.latitude}&lon=${geoPos.longitude}`)
    .then(r => r.json())
    .then(data => {
      if (!data.ward) return;
      currentGPSWard = data;
      if (data.wardCode) {
        const isNew = !wardCodeMap[data.slug];
        wardCodeMap[data.slug] = data.wardCode;
        if (isNew && data.slug === selectedWard) showWardBoundary(selectedWard);
      }
      addWardIfNew(data.ward);
      if (!selectedWard) setSelectedWard(data.slug);
    })
    .catch(() => {});
}

function addWardIfNew(wardName) {
  if (!userWards.includes(wardName)) {
    userWards.push(wardName);
  }
}

function setSelectedWard(slug) {
  selectedWard = slug;
  localStorage.setItem('selectedWard', slug);
  const wardName = userWards.find(w => slugify(w) === slug) || slug;
  document.getElementById('ward-name').textContent = wardName;
  document.getElementById('ward-lozenge').classList.add('show');
  showWardBoundary(slug);
}

function showWardBoundary(slug) {
  if (wardBoundaryLayer) { map.removeLayer(wardBoundaryLayer); wardBoundaryLayer = null; }
  const code = wardCodeMap[slug];
  if (!code) return;
  const url = 'https://services1.arcgis.com/ESMARspQHYMw9BZ9/ArcGIS/rest/services/Wards_May_2024_Boundaries_UK_BSC/FeatureServer/0/query'
    + '?where=' + encodeURIComponent("WD24CD='" + code + "'")
    + '&outFields=WD24NM&f=geojson';
  fetch(url).then(r => r.json()).then(data => {
    if (!data.features || !data.features.length) return;
    wardBoundaryLayer = L.geoJSON(data, {
      style: { color: '#4285f4', weight: 2, opacity: 0.6, fill: false }
    }).addTo(map);
  }).catch(() => {});
}

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function onWardTap() {
  if (currentGPSWard) addWardIfNew(currentGPSWard.ward);
  if (userWards.length > 1) {
    openWardPicker();
  } else if (userWards.length === 1) {
    setSelectedWard(slugify(userWards[0]));
    reloadMarkers();
  }
}

function openWardPicker() {
  const overlay = document.getElementById('ward-overlay');
  const list = document.getElementById('ward-list');
  list.innerHTML = '';
  userWards.forEach(wardName => {
    const slug = slugify(wardName);
    const btn = document.createElement('button');
    btn.className = 'ward-option' + (slug === selectedWard ? ' selected' : '');
    btn.innerHTML = wardName;
    btn.onclick = () => {
      setSelectedWard(slug);
      closeWardPicker();
      reloadMarkers();
    };
    list.appendChild(btn);
  });
  overlay.classList.add('active');
}

function closeWardPicker() {
  document.getElementById('ward-overlay').classList.remove('active');
}

function reloadMarkers() {
  for (const key in markerGroups) {
    map.removeLayer(markerGroups[key].marker);
    delete markerGroups[key];
  }
  closePreview();
  initialLoad = true;
  loadMarkers();
}

// ==================== QR CODE GENERATOR ====================
function generateQR(canvas, text) {
  // Minimal QR code generator (mode byte, version 2, ECC L)
  // For simplicity, use a dynamic import of a small library
  const size = 300;
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, size, size);

  // We'll render via an image from a QR API
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => { ctx.drawImage(img, 0, 0, size, size); };
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=${size}x${size}&data=${encodeURIComponent(text)}`;
}

async function sendInvite() {

  const phone = document.getElementById('invite-phone').value.trim();
  const err = document.getElementById('invite-error');
  if (!name || !phone) { err.textContent = 'Enter name and phone'; err.style.display = ''; return; }
  err.style.display = 'none';

  try {
    const r = await authFetch('/api/invite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', ...authHeaders },
      body: JSON.stringify({ name, phone })
    });
    const data = await r.json();
    if (!r.ok) { err.textContent = data.error; err.style.display = ''; return; }

    // Show QR
    const loginUrl = location.origin + '/@login?phone=' + encodeURIComponent(phone);
    document.getElementById('invite-qr-name').textContent = `QR for ${name}`;
    document.getElementById('invite-sms-status').textContent = data.smsSent

const player = document.getElementById('player');
const vid = document.getElementById('vid');
const transcriptEl = document.getElementById('transcript');
const previewCard = document.getElementById('preview-card');
const cardText = previewCard.querySelector('.card-text');
const cardThumb = previewCard.querySelector('.card-thumb');
const cardPlay = previewCard.querySelector('.card-play');
const cardAudio = document.getElementById('card-audio');

function formatMeta(entry) {
  const parts = [];
  if (entry.user) parts.push(entry.user);
  if (entry.address) parts.push(entry.address);
  if (entry.timestamp) {
    const d = new Date(entry.timestamp);
    parts.push(d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })
      + ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }));
  }
  return parts.join(' · ');
}

function setEntryContent(el, entry, prefix) {
  const meta = formatMeta(entry);
  const text = entry.transcript || '(no transcript yet)';
  const p = prefix || '';
  el.innerHTML = (meta ? `<span class="meta">${p}${meta}</span>` : '') + text;
}

let currentEntry = null;
let currentMarkerEl = null;

function stopCardAudio() {
  cardAudio.pause();
  cardAudio.removeAttribute('src');
  cardAudio.load();
  cardPlay.classList.remove('playing');
}

function closePreview() {
  previewCard.classList.remove('active');
  cardThumb.removeAttribute('src');
  stopCardAudio();
  if (currentMarkerEl) currentMarkerEl.classList.remove('selected');
  currentEntry = null;
  currentMarkerEl = null;
}

function showPreview(entry, markerEl) {
  if (currentMarkerEl) currentMarkerEl.classList.remove('selected');
  stopCardAudio();
  currentEntry = entry;
  currentMarkerEl = markerEl;
  if (markerEl) markerEl.classList.add('selected');
  const key = locKey(entry);
  const group = markerGroups[key];
  let meta = '';
  if (group && group.entries.length > 1) {
    meta = `(${group.index + 1}/${group.entries.length}) `;
  }
  setEntryContent(cardText, entry, meta);
  const hasThumb = !!entry.thumbnail;
  cardThumb.style.display = hasThumb ? '' : 'none';
  cardPlay.style.display = hasThumb ? 'none' : '';
  if (hasThumb) {
    cardThumb.src = '/videos/' + entry.thumbnail;
  }
  previewCard.classList.add('active');
}

function openPlayer(entry) {
  previewCard.classList.remove('active');
  cardThumb.removeAttribute('src');
  vid.style.opacity = '0';
  vid.src = '/videos/' + entry.filename;
  setEntryContent(transcriptEl, entry);
  player.classList.add('active');
  vid.onloadedmetadata = () => { vid.style.opacity = '1'; vid.play(); };
}

function closePlayer() {
  vid.pause(); vid.removeAttribute('src'); vid.load();
  vid.style.opacity = '0'; player.classList.remove('active');
  if (currentEntry) showPreview(currentEntry, currentMarkerEl);
}

cardThumb.addEventListener('click', (e) => { e.stopPropagation(); if (currentEntry) openPlayer(currentEntry); });
cardPlay.addEventListener('click', (e) => {
  e.stopPropagation();
  if (!currentEntry) return;
  if (cardPlay.classList.contains('playing')) {
    stopCardAudio();
  } else {
    cardAudio.src = '/videos/' + currentEntry.filename;
    cardAudio.play();
    cardPlay.classList.add('playing');
  }
});
cardAudio.addEventListener('ended', () => { cardPlay.classList.remove('playing'); });
vid.addEventListener('ended', closePlayer);
player.addEventListener('click', closePlayer);
map.on('click', closePreview);

// ==================== RECORDING ====================
const MAX_SECONDS = 60;
const btn = document.getElementById('btn');
const cameraInset = document.getElementById('camera-inset');
const cameraPreview = document.getElementById('camera-preview');
const cameraTimer = document.getElementById('camera-timer');

let audioOnly = localStorage.getItem('audioOnly') !== 'false'; // default true

function toggleMode() {
  audioOnly = !audioOnly;
  localStorage.setItem('audioOnly', audioOnly);
  document.getElementById('mode-btn').classList.toggle('video-mode', !audioOnly);
}

// Set initial button state
document.getElementById('mode-btn').classList.toggle('video-mode', !audioOnly);
let stream = null;
let recorder = null;
let chunks = [];
let timerInterval = null;
let secondsLeft = MAX_SECONDS;
let secondsElapsed = 0;
let geoPos = null;

let geoInitialised = false;
function initGeo() {
  if (geoInitialised || !navigator.geolocation) return;
  geoInitialised = true;
  navigator.geolocation.watchPosition(p => { geoPos = p.coords; }, () => {},
    { enableHighAccuracy: true, maximumAge: 60000 });
  navigator.geolocation.getCurrentPosition(p => {
    if (!geoPos) geoPos = p.coords;
    resolveWardFromGPS();
  }, () => {}, { enableHighAccuracy: false, maximumAge: Infinity, timeout: 0 });
  setInterval(resolveWardFromGPS, 60000);
}

async function initCamera() {
  if (!window.isSecureContext) return;
  try {
    const constraints = audioOnly
      ? { audio: true }
      : { video: { facingMode: 'user' }, audio: true };
    stream = await navigator.mediaDevices.getUserMedia(constraints);
    if (!audioOnly) cameraPreview.srcObject = stream;
  } catch (e) { console.error('Camera/mic error:', e); }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
    cameraPreview.srcObject = null;
  }
}

async function startRecording() {
  initGeo();
  if (!stream) await initCamera();
  if (!stream) return;
  chunks = [];

  let mimeType;
  if (audioOnly) {
    mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus' : 'audio/webm';
  } else {
    mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
      ? 'video/webm;codecs=vp9,opus' : 'video/webm';
  }
  recorder = new MediaRecorder(stream, { mimeType });
  recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
  recorder.onstop = () => upload();
  recorder.start(100);

  btn.classList.add('recording');
  if (audioOnly) document.getElementById('audio-recording').classList.add('active');
  else cameraInset.classList.add('active');
  secondsLeft = MAX_SECONDS;
  secondsElapsed = 0;
  cameraTimer.textContent = audioOnly ? '0' : secondsLeft;

  timerInterval = setInterval(() => {
    secondsElapsed++;
    if (audioOnly) {
      cameraTimer.textContent = secondsElapsed;
    } else {
      secondsLeft--;
      cameraTimer.textContent = secondsLeft;
      if (secondsLeft <= 0) stopRecording();
    }
  }, 1000);
}

function stopRecording() {
  if (!recorder || recorder.state !== 'recording') return;
  clearInterval(timerInterval);
  recorder.stop();
  btn.classList.remove('recording');
  document.getElementById('audio-recording').classList.remove('active');
  cameraInset.classList.remove('active');
  stopCamera();
}

btn.addEventListener('click', () => {
  if (recorder && recorder.state === 'recording') stopRecording();
  else startRecording();
});

// ==================== UPLOAD QUEUE ====================
function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('fieldnote-queue', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('queue', { keyPath: 'id', autoIncrement: true });
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function enqueue(blob, lat, lon, duration) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').add({ blob, lat, lon, duration, timestamp: new Date().toISOString() });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function getQueue() {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('queue', 'readonly');
    const req = tx.objectStore('queue').getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dequeue(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction('queue', 'readwrite');
    tx.objectStore('queue').delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

let uploading = false;
const CIRC = 2 * Math.PI * 17;

function setUploadProgress(pct) {
  statusEl.querySelector('.fg').style.strokeDashoffset = CIRC * (1 - pct);
}

function xhrUpload(form) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.upload.onprogress = e => { if (e.lengthComputable) setUploadProgress(e.loaded / e.total); };
    xhr.onload = () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try { resolve(JSON.parse(xhr.responseText)); }
        catch { resolve({ ok: true }); }
      } else reject(new Error('Upload failed'));
    };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.ontimeout = () => reject(new Error('Timeout'));
    xhr.timeout = 300000;
    xhr.open('POST', '/upload');
    xhr.setRequestHeader('x-auth-token', authToken);
    xhr.send(form);
  });
}

// ---- Connection quality check ----
async function connectionGood() {
  // Use Network Information API if available
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  if (conn) {
    // Bail on slow or offline connections
    if (conn.saveData) return false;
    const dominated = ['slow-2g', '2g'];
    if (dominated.includes(conn.effectiveType)) return false;
  }
  if (!navigator.onLine) return false;
  // Probe the server with a small request and check latency
  try {
    const start = Date.now();
    const r = await fetch('/api/version', { headers: authHeaders, cache: 'no-store' });
    const latency = Date.now() - start;
    if (!r.ok) return false;
    console.log(`Connection probe: ${latency}ms, type=${conn ? conn.effectiveType : '?'}`);
    return latency < 3000;
  } catch {
    return false;
  }
}

let queuePending = false;
const statusEl = document.getElementById('upload-status');
const statusCount = statusEl.querySelector('.count');

function updateQueueDisplay(remaining) {
  if (remaining === 0) {
    statusEl.classList.add('done');
    statusCount.textContent = '';
    // Hide after tick animation
    setTimeout(() => { statusEl.classList.remove('done'); statusEl.classList.remove('active'); }, 3000);
  } else {
    statusEl.classList.remove('done');
    statusEl.classList.add('active');
    statusCount.textContent = remaining;
  }
}

async function processQueue() {
  if (uploading) { queuePending = true; return; }

  const items = await getQueue();
  if (!items.length) { updateQueueDisplay(0); return; }

  // Check connection before attempting uploads
  if (!await connectionGood()) {
    console.log(`Upload deferred: poor connection (${items.length} queued)`);
    updateQueueDisplay(items.length);
    return;
  }

  uploading = true;
  updateQueueDisplay(items.length);

  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    try {
      setUploadProgress(0);
      updateQueueDisplay(items.length - i);
      await authFetch('/api/pre-upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lat: item.lat, lon: item.lon, duration: item.duration, size: item.blob.size, timestamp: item.timestamp })
      });
      const form = new FormData();
      form.append('video', item.blob, 'fieldnote.webm');
      form.append('lat', item.lat || '');
      form.append('lon', item.lon || '');
      form.append('recorded_at', item.timestamp || '');
      const resp = await xhrUpload(form);
      if (!resp.ok || !resp.filename) throw new Error('Server did not confirm receipt');
      setUploadProgress(1);
      await dequeue(item.id);
      console.log('Upload confirmed:', resp.filename);
      playDing();
    } catch (e) {
      uploading = false;
      return;
    }
  }

  uploading = false;

  if (queuePending) {
    queuePending = false;
    processQueue();
  } else {
    const remaining = await getQueue();
    if (remaining.length > 0) {
      processQueue();
    } else {
      updateQueueDisplay(0);
    }
  }
}

setInterval(processQueue, 30000);

async function upload() {
  const blob = new Blob(chunks, { type: audioOnly ? 'audio/webm' : 'video/webm' });
  const duration = audioOnly ? secondsElapsed : MAX_SECONDS - secondsLeft;
  const lat = geoPos ? geoPos.latitude : null;
  const lon = geoPos ? geoPos.longitude : null;

  await enqueue(blob, lat, lon, duration);
  setUploadProgress(0);
  processQueue(); // don't await — let it run in background so user can keep recording
}

function playDing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1760, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  } catch (_) {}
}

const myName = localStorage.getItem('userName') || '?';
const MeIcon = userIcon(myName, true);
let meMarker = null;

function updateMyLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(p => {
    const ll = [p.coords.latitude, p.coords.longitude];
    if (meMarker) meMarker.setLatLng(ll);

updateMyLocation();
setInterval(updateMyLocation, 60000);

const DotIcon = L.divIcon({ className: 'fn-dot', iconSize: [24, 24] });
const markerGroups = {};
let allEntries = {};
let initialLoad = true;
let filterMode = 'today'; // 'today' or 'all'

function toggleFilter() {
  filterMode = filterMode === 'today' ? 'all' : 'today';
  document.getElementById('filter-btn').classList.toggle('show-all', filterMode === 'all');
  // Clear all markers and reload
  for (const key in markerGroups) {
    map.removeLayer(markerGroups[key].marker);
    delete markerGroups[key];
  }
  closePreview();
  initialLoad = true;
  loadMarkers();
}

function isToday(timestamp) {
  return new Date(timestamp).toDateString() === new Date().toDateString();
}

function locKey(entry) {
  return (Math.round(entry.lat * 10000) / 10000) + ',' + (Math.round(entry.lon * 10000) / 10000);
}

function loadMarkers() {
  const wardParam = selectedWard ? '?ward=' + encodeURIComponent(selectedWard) : '';
  authFetch('/api/uploads' + wardParam).then(r => r.json()).then(rawEntries => {
    const entries = filterMode === 'today'
      ? rawEntries.filter(e => isToday(e.timestamp))
      : rawEntries;

    if (!entries.length && !meMarker && initialLoad) { map.setView([51.5, -0.13], 13); return; }

    const seen = new Set();
    entries.forEach(e => { allEntries[e.filename] = e; seen.add(e.filename); });
    for (const key in allEntries) { if (!seen.has(key)) delete allEntries[key]; }

    const newGroups = {};
    entries.forEach(entry => {
      const key = locKey(entry);
      if (!newGroups[key]) newGroups[key] = [];
      newGroups[key].push(entry);
    });

    for (const key in markerGroups) {
      if (!newGroups[key]) { map.removeLayer(markerGroups[key].marker); delete markerGroups[key]; }
    }

    for (const key in newGroups) {
      const groupEntries = newGroups[key];
      if (markerGroups[key]) {
        markerGroups[key].entries = groupEntries;
        if (markerGroups[key].index >= groupEntries.length) markerGroups[key].index = 0;
      } else {
        const first = groupEntries[0];
        const marker = L.marker([first.lat, first.lon], { icon: DotIcon }).addTo(map);
        const group = { marker, entries: groupEntries, index: 0 };
        markerGroups[key] = group;
        marker.on('click', () => {
          if (currentEntry && locKey(currentEntry) === key) {
            group.index = (group.index + 1) % group.entries.length;
          } else { group.index = 0; }
          showPreview(group.entries[group.index], marker.getElement());
        });
      }
    }

    if (initialLoad) {
      const bounds = entries.map(e => [e.lat, e.lon]);
      if (meMarker) bounds.push(meMarker.getLatLng());
      if (bounds.length) map.fitBounds(bounds, { padding: [40, 40], maxZoom: 16 });
      initialLoad = false;
    }
  });
}

loadMarkers();
setInterval(loadMarkers, 15000);

// ==================== REPORT ====================
function renderReport(md) {
  return md
    .replace(/^---$/gm, '<hr>')
    .replace(/^### (.*)/gm, '<h3>$1</h3>')
    .replace(/^## (.*)/gm, '<h2>$1</h2>')
    .replace(/^# (.*)/gm, '<h1>$1</h1>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/^- (.*)/gm, '<li>$1</li>')
    .replace(/((?:<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>')
    .replace(/\n+(<h[123])/g, '$1')
    .replace(/\n+(<hr)/g, '$1')
    .replace(/\n+(<ul)/g, '$1')
    .replace(/\n{2,}/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>').replace(/$/, '</p>')
    .replace(/<p>(<h[123]|<hr|<ul)/g, '$1')
    .replace(/(<\/h[123]>|<hr>|<\/ul>)<\/p>/g, '$1');
}

function openReport() {
  const overlay = document.getElementById('report-overlay');
  const content = document.getElementById('report-content');
  const wardName = userWards.find(w => slugify(w) === selectedWard) || selectedWard || '';
  document.getElementById('report-title').textContent = wardName ? wardName + ' Canvassing Report' : 'Canvassing Report';
  content.textContent = '';
  overlay.classList.add('active');
  const wardParam = selectedWard ? '?ward=' + encodeURIComponent(selectedWard) : '';
  authFetch('/api/report' + wardParam)
    .then(r => { if (!r.ok) throw new Error('Server error'); return r.json(); })
    .then(data => { content.innerHTML = renderReport(data.report) + '<p style="font-size:11px;opacity:0.4;margin-top:24px">Map data &copy; OpenStreetMap contributors &bull; Leaflet</p>'; })
    .catch(() => { content.textContent = 'Report unavailable — try again shortly.'; });
}

// ==================== SSE / PEERS ====================
const sse = new EventSource('/api/events?token=' + encodeURIComponent(authToken));
let myClientId = null;
const peerMarkers = {};

sse.addEventListener('welcome', (e) => {
  myClientId = JSON.parse(e.data).id;
  sendMyLocation();
  setInterval(sendMyLocation, 15000);
});

sse.addEventListener('locations', (e) => {
  const locations = JSON.parse(e.data);
  const seen = new Set();
  locations.forEach(loc => {
    if (loc.id === myClientId) return;
    seen.add(loc.id);
    if (peerMarkers[loc.id]) peerMarkers[loc.id].setLatLng([loc.lat, loc.lon]);
    else peerMarkers[loc.id] = L.marker([loc.lat, loc.lon], { icon: userIcon(loc.name, false), zIndexOffset: 500 }).addTo(map);
  });
  for (const id in peerMarkers) {
    if (!seen.has(parseInt(id))) { map.removeLayer(peerMarkers[id]); delete peerMarkers[id]; }
  }
});

function sendMyLocation() {
  if (!myClientId || !navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(p => {
    authFetch('/api/location', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: myClientId, lat: p.coords.latitude, lon: p.coords.longitude })
    });
  }, () => {}, { enableHighAccuracy: true, timeout: 10000 });
}

sse.addEventListener('new-upload', () => loadMarkers());

// ==================== VERSION POLLING ====================
let appVersion = null;

function checkVersion() {
  authFetch('/api/version').then(r => r.json()).then(data => {
    if (appVersion === null) { appVersion = data.version; return; }
    if (data.version !== appVersion) {
      sessionStorage.setItem('versionUpdated', data.version);
      const isRecording = recorder && recorder.state === 'recording';
      if (isRecording || uploading) {
        const check = setInterval(() => {
          if (!(recorder && recorder.state === 'recording') && !uploading) {
            clearInterval(check); location.reload();
          }
        }, 2000);
      } else if (player.classList.contains('active')) {
        vid.addEventListener('ended', () => location.reload(), { once: true });
        player.addEventListener('click', () => location.reload(), { once: true });
      } else {
        location.reload();
      }
    }
  }).catch(() => {});
}

checkVersion();
setInterval(checkVersion, 5000);

// ==================== SERVICE WORKER ====================
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

// ==================== INIT ====================
// Defer geo permission until first user interaction
document.addEventListener('click', initGeo, { once: true });
document.addEventListener('touchstart', initGeo, { once: true });

// Send location immediately when app comes back to foreground
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') { updateMyLocation(); sendMyLocation(); }
});

// Show version badge if we just updated
const updatedVersion = sessionStorage.getItem('versionUpdated');
if (updatedVersion) {
  sessionStorage.removeItem('versionUpdated');
  playDing();
  const badge = document.getElementById('version-badge');
  badge.textContent = 'v' + updatedVersion;
  badge.classList.add('show');
  setTimeout(() => badge.classList.remove('show'), 4000);
}
</script>
